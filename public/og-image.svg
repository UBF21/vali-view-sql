<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f10"/>
      <stop offset="100%" style="stop-color:#1a1025"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#863bff"/>
      <stop offset="100%" style="stop-color:#47bfff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(134,59,255,0.07)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Glow blob top-right -->
  <ellipse cx="950" cy="120" rx="300" ry="200" fill="#863bff" opacity="0.08" filter="url(#glow)"/>
  <!-- Glow blob bottom-left -->
  <ellipse cx="200" cy="520" rx="250" ry="150" fill="#47bfff" opacity="0.06" filter="url(#glow)"/>

  <!-- Diagram nodes (decorative) -->
  <!-- Table node -->
  <rect x="760" y="160" width="160" height="50" rx="8" fill="rgba(134,59,255,0.15)" stroke="rgba(134,59,255,0.5)" stroke-width="1.5"/>
  <text x="840" y="190" text-anchor="middle" font-family="monospace" font-size="13" fill="#b794ff">users</text>
  <!-- Join node -->
  <rect x="760" y="260" width="160" height="50" rx="8" fill="rgba(71,191,255,0.1)" stroke="rgba(71,191,255,0.4)" stroke-width="1.5"/>
  <text x="840" y="290" text-anchor="middle" font-family="monospace" font-size="13" fill="#93d9ff">JOIN</text>
  <!-- Filter node -->
  <rect x="760" y="360" width="160" height="50" rx="8" fill="rgba(134,59,255,0.12)" stroke="rgba(134,59,255,0.35)" stroke-width="1.5"/>
  <text x="840" y="390" text-anchor="middle" font-family="monospace" font-size="13" fill="#b794ff">WHERE</text>
  <!-- Output node -->
  <rect x="960" y="305" width="160" height="50" rx="8" fill="rgba(71,191,255,0.1)" stroke="rgba(71,191,255,0.35)" stroke-width="1.5"/>
  <text x="1040" y="335" text-anchor="middle" font-family="monospace" font-size="13" fill="#93d9ff">OUTPUT</text>

  <!-- Connecting lines -->
  <line x1="920" y1="210" x2="840" y2="260" stroke="rgba(134,59,255,0.4)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="840" y1="310" x2="840" y2="360" stroke="rgba(71,191,255,0.3)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="920" y1="310" x2="960" y2="330" stroke="rgba(71,191,255,0.3)" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="920" y1="385" x2="960" y2="340" stroke="rgba(134,59,255,0.35)" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Vertical accent bar -->
  <rect x="80" y="160" width="4" height="310" rx="2" fill="url(#accent)"/>

  <!-- Logo icon (lightning bolt shape approximation) -->
  <g transform="translate(110, 175)">
    <path d="M20 0 L8 22 L16 22 L4 44 L28 18 L18 18 Z" fill="url(#accent)" opacity="0.9"/>
  </g>

  <!-- Main title -->
  <text x="160" y="222" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="68" font-weight="800" fill="white" letter-spacing="-2">View<tspan fill="url(#accent)">SQL</tspan></text>

  <!-- Tagline -->
  <text x="160" y="278" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="26" fill="rgba(255,255,255,0.6)" letter-spacing="0.3">Visualize · Explain · Diff · Optimize</text>

  <!-- Divider -->
  <line x1="160" y1="310" x2="680" y2="310" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- Features row -->
  <text x="160" y="360" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" fill="rgba(255,255,255,0.45)">Interactive diagram</text>
  <text x="160" y="390" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" fill="rgba(255,255,255,0.45)">Step-by-step execution</text>
  <text x="160" y="420" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" fill="rgba(255,255,255,0.45)">Side-by-side diff</text>
  <text x="160" y="450" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" fill="rgba(255,255,255,0.45)">Optimization suggestions</text>

  <!-- Dialect badges -->
  <rect x="160" y="490" width="115" height="32" rx="6" fill="rgba(65,105,225,0.2)" stroke="rgba(65,105,225,0.5)" stroke-width="1"/>
  <text x="218" y="511" text-anchor="middle" font-family="monospace" font-size="13" font-weight="600" fill="#6495ED">PostgreSQL</text>

  <rect x="288" y="490" width="80" height="32" rx="6" fill="rgba(68,121,161,0.2)" stroke="rgba(68,121,161,0.5)" stroke-width="1"/>
  <text x="328" y="511" text-anchor="middle" font-family="monospace" font-size="13" font-weight="600" fill="#5590b4">MySQL</text>

  <rect x="382" y="490" width="105" height="32" rx="6" fill="rgba(204,41,39,0.2)" stroke="rgba(204,41,39,0.5)" stroke-width="1"/>
  <text x="435" y="511" text-anchor="middle" font-family="monospace" font-size="13" font-weight="600" fill="#e05c5a">SQL Server</text>

  <!-- URL -->
  <text x="160" y="580" font-family="monospace" font-size="16" fill="rgba(255,255,255,0.25)">free · no signup · open source</text>
</svg>
